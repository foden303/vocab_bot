<div class="card back">
    <div class="header">
        <div class="collocation-mini">{{collocation}}</div>
        <div class="type-mini">{{type}}</div>

        <!-- {{#level}} -->
        <div class="level-badge">{{level}}</div>
        <!-- {{/level}} -->
    </div>

    <div class="divider"></div>

    <div class="main-content">
        <div class="audio-container">
            {{sound}}{{^sound}}{{tts en_US:collocation}}{{/sound}}
        </div>

        <div class="meaning-box">
            <span class="meaning-text">{{meaning}}</span>
        </div>

        <!-- {{#example}} -->
        <div class="section example-section">
            <div class="label">Example</div>
            <div class="content italic">"{{example}}"</div>
        </div>
        <!-- {{/example}} -->

        <!-- {{#synonyms}} -->
        <div class="section">
            <div class="label">Similar Expressions</div>
            <div class="content list-content">{{synonyms}}</div>
        </div>
        <!-- {{/synonyms}} -->
    </div>
</div>

<style>

    }

    .section {

    .label {
